

<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Financeiro PREMIUM</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f2027;color:#fff}
.app{max-width:500px;margin:auto;padding:15px}
.card{background:#1c2833;padding:20px;border-radius:20px;margin-top:15px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
button{padding:12px;border:none;border-radius:12px;margin:6px 0;width:100%;cursor:pointer;font-size:15px}
button:hover{opacity:0.9}
.hidden{display:none}
.top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px}
.feedback{margin-top:10px;font-weight:bold}
.correct{background:#2ecc71}
.wrong{background:#e74c3c}
.progress{height:8px;background:#555;border-radius:10px;margin-top:10px}
.bar{height:100%;background:#00ffc3;border-radius:10px;width:0%}
</style>
</head>
<body>

<div class="app">

<div class="card" id="start">
<h2>📱 Simulador Financeiro PREMIUM</h2>
<input id="group" placeholder="Nome do Grupo"><br><br>
<input id="class" placeholder="Turma"><br><br>
<button id="startBtn">Iniciar Missão</button>
</div>

<div class="card hidden" id="game">
<div class="top">
<span>⭐ <span id="score">0</span></span>
<span>💰 <span id="money">1000</span>€</span>
<span>⏱ <span id="time">0</span>s</span>
</div>

<h3 id="story"></h3>
<div id="choices"></div>
<div id="feedback" class="feedback"></div>
<div class="progress"><div id="bar" class="bar"></div></div>
</div>

<div class="card hidden" id="end">
<h2>🏆 Ranking Global</h2>
<p id="result"></p>
<div id="leader"></div>
</div>

</div>

<script type="module">

// 🔥 FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCdZdChJiUb183kZFB2tNKCZSNfYtFWzrw",
  authDomain: "segdig-11831.firebaseapp.com",
  projectId: "segdig-11831",
  storageBucket: "segdig-11831.firebasestorage.app",
  messagingSenderId: "356326803992",
  appId: "1:356326803992:web:5a19f95cd2d6dc4ba0916d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

emailjs.init("d9d86G7bDE1WQ8eDy");

// 🎮 VARIÁVEIS
let score=0;
let money=1000;
let startTime;
let timer;
let stepIndex=0;

const steps=[
{q:"Recebes um SMS com link para 'confirmar dados bancários'.",c:["Clicar no link","Ignorar e apagar"],a:1,good:50,bad:-200,exp:"Era phishing. Nunca clicar em links suspeitos."},
{q:"Site tem preço muito abaixo do mercado.",c:["Comprar","Verificar reputação"],a:1,good:40,bad:-100,exp:"Preços demasiado baixos podem indicar fraude."},
{q:"Pedido MBWay de desconhecido.",c:["Aceitar","Recusar"],a:1,good:60,bad:-250,exp:"Nunca aceitar pedidos desconhecidos."},
{q:"Guardar cartão no navegador partilhado.",c:["Sim","Não"],a:1,good:50,bad:-150,exp:"Evita guardar dados em dispositivos partilhados."},
{q:"Ativar autenticação de dois fatores.",c:["Sim","Não"],a:0,good:70,bad:-80,exp:"2FA aumenta muito a segurança."},
{q:"Verificas extrato bancário regularmente?",c:["Sim","Não"],a:0,good:40,bad:-100,exp:"Monitorizar movimentos ajuda a detetar fraude."}
];

// 🔥 INICIAR JOGO

document.getElementById("startBtn").addEventListener("click", startGame);

function startGame(){
startTime=new Date();
document.getElementById("start").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

timer=setInterval(()=>{
document.getElementById("time").innerText=
Math.floor((new Date()-startTime)/1000);
},1000);

nextStep();
}

function nextStep(){
let s=steps[stepIndex];
document.getElementById("story").innerText=s.q;
let div=document.getElementById("choices");
div.innerHTML="";
document.getElementById("feedback").innerText="";

s.c.forEach((opt,i)=>{
let b=document.createElement("button");
b.innerText=opt;
b.onclick=()=>choose(i,b);
div.appendChild(b);
});

let percent=(stepIndex/steps.length)*100;
document.getElementById("bar").style.width=percent+"%";
}

function choose(i,btn){
let s=steps[stepIndex];

if(i===s.a){
score++;
money+=s.good;
btn.classList.add("correct");
document.getElementById("feedback").innerText="✔ Correto! " + s.exp;
}else{
money+=s.bad;
btn.classList.add("wrong");
document.getElementById("feedback").innerText="✖ Atenção! " + s.exp;
}

updateUI();

setTimeout(()=>{
stepIndex++;
if(stepIndex<steps.length){nextStep();}
else{endGame();}
},1500);
}

function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("money").innerText=money;
}

async function endGame(){
clearInterval(timer);
document.getElementById("game").classList.add("hidden");
document.getElementById("end").classList.remove("hidden");

let time=Math.floor((new Date()-startTime)/1000);
let group=document.getElementById("group").value;
let turma=document.getElementById("class").value;

let result=`${group} | ${turma} | ⭐${score} | 💰${money}€ | ⏱${time}s`;
document.getElementById("result").innerText=result;

await addDoc(collection(db,"ranking"),{group,turma,score,money,time});

const q=query(collection(db,"ranking"),orderBy("score","desc"),limit(5));
const snapshot=await getDocs(q);

let html="";
snapshot.forEach(doc=>{
let d=doc.data();
html+=`<p>${d.group} - ⭐${d.score} 💰${d.money}€</p>`;
});
document.getElementById("leader").innerHTML=html;

emailjs.send("service_wi13tin","template_8hy77yw",{
 group:group,
 turma:turma,
 score:score,
 time:time
});
}

</script>

</body>
</html>
